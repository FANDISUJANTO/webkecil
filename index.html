
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Auto Minus</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .box {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  label {
    font-size: 12px;
    color: #bbb;
    width: 80px;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input[type=number] {
    -moz-appearance: textfield;
  }

  input {
    width: 110px;
    padding: 6px;
    font-size: 14px;
    text-align: right;
  }

  .result {
    width: 110px;
    padding: 6px;
    background: #222;
    border: 1px solid #555;
    text-align: right;
    user-select: none;
  }

  .copied {
    font-size: 11px;
    color: #4caf50;
    display: none;
    text-align: center;
  }
.top-gif {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
}

.top-gif img {
  width: 500px;
  height: auto;
  display: block;
}

.container {
  margin-top: 10px;
}</style>
</head>

<body>
  
<div class="top-gif">
  <img src="https://imgstore.io/images/2026/02/01/logo-utama.gif">
</div>

<div class="container">

  <!-- AUTO -1000 -->
  <div>
    <div class="box">
      <label>-1000</label>
      <input type="number" id="input1000" placeholder="Jumlah">
      <div class="result" id="hasil1000">0</div>
    </div>
    <div class="copied" id="copied1000">Tersalin ✔</div>
  </div>

  <!-- AUTO -2500 -->
  <div>
    <div class="box">
      <label>-2500</label>
      <input type="number" id="input2500" placeholder="Jumlah">
      <div class="result" id="hasil2500">0</div>
    </div>
    <div class="copied" id="copied2500">Tersalin ✔</div>
  </div>

  <!-- AUTO -6500 -->
  <div>
    <div class="box">
      <label>-6500</label>
      <input type="number" id="input6500" placeholder="Jumlah" autofocus>
      <div class="result" id="hasil6500">0</div>
    </div>
    <div class="copied" id="copied6500">Tersalin ✔</div>
  </div>

</div>

<script>

function setupAutoMinus(inputId, hasilId, copiedId, minusValue) {

  const input = document.getElementById(inputId);
  const hasil = document.getElementById(hasilId);
  const copiedText = document.getElementById(copiedId);

  // Auto hitung
  input.addEventListener("input", () => {
    const val = parseInt(input.value) || 0;
    hasil.textContent = val - minusValue;
  });

  // ENTER otomatis copy
  input.addEventListener("keydown", (e) => {

    if (e.key === "Enter") {

      e.preventDefault();

      navigator.clipboard.writeText(hasil.textContent);

      copiedText.style.display = "block";

      setTimeout(() => {
        copiedText.style.display = "none";
      }, 1000);

      input.value = "";
      hasil.textContent = "0";

      input.focus();
    }

  });

}

// Setup
setupAutoMinus("input1000", "hasil1000", "copied1000", 1000);
setupAutoMinus("input2500", "hasil2500", "copied2500", 2500);
setupAutoMinus("input6500", "hasil6500", "copied6500", 6500);

</script>

</body>
</html>
